<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Nullframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="navbar">
        <div class="nav-content">
            <a href="index.html" class="brand-link">
                <img src="assets/nullframelogo.png" alt="Nullframe Logo" class="brand-logo" onerror="this.style.display='none'">
                <h2>Nullframe</h2>
            </a>
            <div class="nav-links">
                <a href="about.html">About</a>
                <a href="index.html#skills">Skills</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
                <button id="theme-toggle" class="theme-btn" title="Toggle Theme">☀️</button>
            </div>
        </div>
    </nav>

    <section id="contact-page" class="container page-content">
        <div class="contact-header" style="text-align: center; margin-bottom: 3rem;">
            <h2>Let's Build Something</h2>
            <p>Ready to start a project or want to learn more? Send Nullframe a message!</p>
        </div>
        
        <div class="form-container">
            <form action="https://formspree.io/f/mvzlnbbj" class="fs-form" method="POST">
                
                <input type="hidden" name="_next" value="https://thej4nitorng.github.io/JESimplePortfolio/thankyou.html">

                <div class="fs-field">
                    <label class="fs-label" for="name">Name</label>
                    <input class="fs-input" id="name" name="name" required />
                </div>
                <div class="fs-field">
                    <label class="fs-label" for="email">Email Address</label>
                    <input class="fs-input" type="email" id="email" name="email" required />
                </div>
                <div class="fs-field">
                    <label class="fs-label" for="number">Phone Number</label>
                    <input class="fs-input" type="tel" id="number" name="number" required />
                </div>
                <div class="fs-field">
                    <label class="fs-label" for="message">Inquiry (What would you like to build?) </label>
                    <textarea class="fs-textarea" id="message" name="message" rows="5" required></textarea>
                </div>
                <div class="fs-button-group">
                    <button class="fs-button" type="submit">Submit</button>
                </div>
            </form>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <p>Email: <a href="mailto:j.elder@fehrwaretech.ca">j.elder@fehrwaretech.ca</a> | Phone: <a href="tel:12044704661">1-204-470-4661</a></p>
            <p class="copyright">© 2026 Nullframe.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
